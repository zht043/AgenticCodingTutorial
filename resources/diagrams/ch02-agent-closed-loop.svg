<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180" role="img" aria-labelledby="title desc">
  <title id="title">Agent 四部分闭环示意图</title>
  <desc id="desc">下排依次为环境任务、观察、LLM、Planning，上排依次为 Tools、结果反馈、Memory，并由 Memory 返回到 LLM，形成蛇形闭环。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d" />
    </marker>
  </defs>

  <rect x="200" y="20" width="160" height="46" rx="10" fill="#e8d6ff" stroke="#2d2d2d" stroke-width="2" />
  <rect x="390" y="20" width="160" height="46" rx="10" fill="#f4b8ba" stroke="#2d2d2d" stroke-width="2" />
  <rect x="580" y="20" width="160" height="46" rx="10" fill="#ffe3a3" stroke="#2d2d2d" stroke-width="2" />

  <rect x="10" y="112" width="160" height="46" rx="10" fill="#d8eefb" stroke="#2d2d2d" stroke-width="2" />
  <rect x="200" y="112" width="160" height="46" rx="10" fill="#f4b8ba" stroke="#2d2d2d" stroke-width="2" />
  <rect x="390" y="112" width="160" height="46" rx="10" fill="#b7e3a1" stroke="#2d2d2d" stroke-width="2" />
  <rect x="580" y="112" width="160" height="46" rx="10" fill="#f7c6c7" stroke="#2d2d2d" stroke-width="2" />

  <g fill="#2d2d2d" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="18" font-weight="600" text-anchor="middle" dominant-baseline="middle">
    <text x="280" y="43">Memory</text>
    <text x="470" y="43">结果 / 反馈</text>
    <text x="660" y="43">Tools</text>
    <text x="90" y="135">环境 / 任务</text>
    <text x="280" y="135">观察</text>
    <text x="470" y="135">LLM</text>
    <text x="660" y="135">Planning</text>
  </g>

  <path d="M 170 135 H 200" fill="none" stroke="#2d2d2d" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 360 135 H 390" fill="none" stroke="#2d2d2d" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 550 135 H 580" fill="none" stroke="#2d2d2d" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 660 112 V 66" fill="none" stroke="#2d2d2d" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 580 43 H 550" fill="none" stroke="#2d2d2d" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 390 43 H 360" fill="none" stroke="#2d2d2d" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 280 66 C 300 102, 420 102, 470 112" fill="none" stroke="#2d2d2d" stroke-width="3" marker-end="url(#arrow)" />
</svg>
